name: Build and Release VSIX

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with v

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Extension
        run: npm run compile # Change if you use yarn or a different build step

      - name: Install vsce CLI
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        run: vsce package # Generates a file like extension-name-1.0.0.vsix

      - name: Create GitHub Release and Upload VSIX
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} *.vsix \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
